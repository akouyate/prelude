services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prelude
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    volumes:
      - prelude_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prelude"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - prelude_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  clamav:
    image: clamav/clamav:1.5.3_base-debian
    restart: unless-stopped
    profiles: ["role-intake"]
    environment:
      # ClamAV's signature set is large. Avoid a second in-memory copy while
      # definitions reload; Railway should allocate this service at least 2 GB.
      CLAMD_CONF_ConcurrentDatabaseReload: "no"
    mem_limit: 2g
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - prelude_clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=1:1 --quiet"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  prelude_postgres_data:
    name: prelude_postgres_data
  prelude_redis_data:
    name: prelude_redis_data
  prelude_clamav_data:
    name: prelude_clamav_data
