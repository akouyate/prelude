services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prelude
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prelude_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prelude"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  prelude_postgres_data:
    name: prelude_postgres_data
